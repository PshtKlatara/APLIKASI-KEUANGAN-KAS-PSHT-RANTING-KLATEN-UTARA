<!DOCTYPE html>
<html lang="id">
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
      :root { --primary: #1a1a1a; --accent: #dc3545; }
      body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #333; }
      .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
      .header-psht { background: linear-gradient(135deg, #000 0%, #2b2b2b 100%); color: #fff; padding: 30px; border-bottom: 6px solid #dc3545; }
      .table thead { background-color: #f1f1f1; }
      .btn-pdf { background-color: #dc3545; color: white; border: none; }
      #areaCetak table { width: 100%; }
    </style>
  </head>
  <body>

    <div class="header-psht text-center">
      <img src="https://lh3.googleusercontent.com/d/1MT3dt4rWKFYlMYoXmsXBQdhK_XTL1Bw2" style="width: 80px; margin-bottom: 15px;">
      <h2 class="fw-bold text-uppercase" style="letter-spacing: 2px;">APLIKASI KEUANGAN KAS</h2>
      <h5 class="text-warning fw-normal">PSHT RANTING KLATEN UTARA</h5>
    </div>

    <div class="container py-4">
      <!-- Filter -->
      <div class="row mb-4 g-2">
        <div class="col-md-3"><select class="form-select fw-bold" id="filterRayon" onchange="filterAllData()"><option value="Semua">-- Semua Unit --</option><option value="Ranting Klaten Utara">Ranting Klaten Utara</option><option value="Rayon Belangwetan">Rayon Belangwetan</option><option value="Rayon Ketandan">Rayon Ketandan</option></select></div>
        <div class="col-md-3"><input type="month" class="form-control" id="filterBulan" onchange="filterAllData()"></div>
        <div class="col-md-2"><input type="number" class="form-control" id="filterTahun" placeholder="Tahun (YYYY)" onchange="filterAllData()"></div>
        <div class="col-md-4"><button class="btn btn-outline-secondary w-100" onclick="resetFilter()">Reset Filter</button></div>
      </div>

      <!-- Kartu Info -->
      <div class="row mb-4 g-3">
        <div class="col-md-4"><div class="card p-4 bg-dark text-white text-center">Saldo Kas<h3 class="fw-bold" id="cardSaldo">Rp 0</h3></div></div>
        <div class="col-md-4"><div class="card p-4 bg-success text-white text-center">Pemasukan<h3 class="fw-bold" id="cardMasuk">Rp 0</h3></div></div>
        <div class="col-md-4"><div class="card p-4 bg-danger text-white text-center">Pengeluaran<h3 class="fw-bold" id="cardKeluar">Rp 0</h3></div></div>
      </div>

      <div class="card p-3">
        <div class="row">
          <div class="col-lg-4">
            <form id="kasForm" onsubmit="event.preventDefault(); submitForm();" class="p-3 bg-light rounded">
              <input type="hidden" id="id">
              <div class="mb-2"><label class="fw-bold small">Tanggal</label><input type="date" class="form-control" id="tanggal" required></div>
              <div class="mb-2"><label class="fw-bold small">Unit / Rayon</label><select class="form-select" id="rayon" required><option value="Ranting Klaten Utara">Ranting Klaten Utara</option><option value="Rayon Belangwetan">Rayon Belangwetan</option><option value="Rayon Ketandan">Rayon Ketandan</option></select></div>
              <div class="mb-2"><label class="fw-bold small">Jenis</label><select class="form-select" id="jenis" required><option value="Pemasukan">Pemasukan</option><option value="Pengeluaran">Pengeluaran</option></select></div>
              <div class="mb-2"><label class="fw-bold small">Nominal (Rp)</label><input type="number" class="form-control" id="nominal" required></div>
              <div class="mb-2"><label class="fw-bold small">Metode</label><select class="form-select" id="metode" required><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option></select></div>
              <div class="mb-2"><label class="fw-bold small">Keterangan</label><input type="text" class="form-control" id="keterangan" required></div>
              <button type="submit" class="btn btn-dark w-100" id="btnSubmit">Simpan Transaksi</button>
            </form>
          </div>
          <div class="col-lg-8" id="areaCetak">
            <div class="d-flex justify-content-between mb-2"><h5>Riwayat Transaksi</h5><button class="btn btn-pdf btn-sm" onclick="exportToPDF()">Unduh PDF</button></div>
            <div class="table-responsive"><table class="table table-hover"><thead><tr><th>Tgl</th><th>Unit</th><th>Jenis</th><th>Nominal</th><th>Keterangan</th><th>Aksi</th></tr></thead><tbody id="dataTable"></tbody></table></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let MASTER_DATA = [];
      document.addEventListener('DOMContentLoaded', refreshData);
      
      function refreshData() { google.script.run.withSuccessHandler(d => { MASTER_DATA = d; filterAllData(); }).getKasData(); }
      
      function filterAllData() {
        const rayon = document.getElementById('filterRayon').value;
        const bulan = document.getElementById('filterBulan').value;
        const tahun = document.getElementById('filterTahun').value;
        const filtered = MASTER_DATA.filter(i => (rayon === 'Semua' || i.rayon === rayon) && (bulan === '' || i.tanggal.startsWith(bulan)) && (tahun === '' || i.tanggal.startsWith(tahun)));
        
        let m = 0, k = 0;
        filtered.forEach(i => { if(i.jenis === 'Pemasukan') m += Number(i.nominal); else k += Number(i.nominal); });
        
        const f = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
        document.getElementById('cardSaldo').innerText = f.format(m - k);
        document.getElementById('cardMasuk').innerText = f.format(m);
        document.getElementById('cardKeluar').innerText = f.format(k);
        
        document.getElementById('dataTable').innerHTML = filtered.map(r => `<tr><td>${r.tanggal}</td><td>${r.rayon}</td><td>${r.jenis}</td><td>${f.format(r.nominal)}</td><td>${r.keterangan}</td><td><button class="btn btn-warning btn-sm" onclick="editData('${r.id}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="hapusData('${r.id}')">Hapus</button></td></tr>`).join('');
      }

      function resetFilter() { document.getElementById('filterRayon').value = 'Semua'; document.getElementById('filterBulan').value = ''; document.getElementById('filterTahun').value = ''; filterAllData(); }
      
      function editData(id) { 
        const d = MASTER_DATA.find(i => i.id === id); 
        document.getElementById('id').value = d.id; document.getElementById('tanggal').value = d.tanggal; document.getElementById('rayon').value = d.rayon; document.getElementById('jenis').value = d.jenis; document.getElementById('nominal').value = d.nominal; document.getElementById('metode').value = d.metode; document.getElementById('keterangan').value = d.keterangan; window.scrollTo({ top: 0, behavior: 'smooth' }); 
      }

      function hapusData(id) { if(confirm('Hapus data ini?')) { google.script.run.withSuccessHandler(refreshData).deleteKasData(id); } }

      function submitForm() { 
        const obj = { id: document.getElementById('id').value, tanggal: document.getElementById('tanggal').value, rayon: document.getElementById('rayon').value, jenis: document.getElementById('jenis').value, nominal: document.getElementById('nominal').value, metode: document.getElementById('metode').value, keterangan: document.getElementById('keterangan').value }; 
        google.script.run.withSuccessHandler(() => { document.getElementById('kasForm').reset(); document.getElementById('id').value = ''; refreshData(); }).saveKasData(obj); 
      }
      
      function exportToPDF() {
        const element = document.getElementById('areaCetak');
        html2pdf().from(element).save('Laporan_Keuangan.pdf');
      }
    </script>
  </body>
</html>
